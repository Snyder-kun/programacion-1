<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafetín - Admin</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 20px;
      background: radial-gradient(circle at top left, rgba(196, 133, 86, 0.16), transparent 34%), linear-gradient(180deg, #f9f3eb 0%, #f5e6d5 100%);
      color: #42322a;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      background: rgba(255, 255, 255, 0.96);
      padding: 22px;
      border-radius: 14px;
      border: 1px solid rgba(118, 81, 53, 0.16);
      box-shadow: 0 14px 40px rgba(66, 50, 42, 0.08);
    }
    h1, h2 {
      color: #5a3d2a;
      margin-top: 0;
    }
    h1 {
      letter-spacing: 0.03em;
    }
    h2 {
      border-bottom: 1px solid #e1c7b2;
      padding-bottom: 6px;
    }
    a {
      color: #7b5233;
      text-decoration: none;
      border-bottom: 1px dashed rgba(123, 82, 51, 0.7);
    }
    a:hover {
      color: #5a3d2a;
    }
    input, select, button {
      padding: 8px 10px;
      margin: 5px 5px 10px 0;
      border: 1px solid #c7a58a;
      border-radius: 8px;
      background: #fffaf3;
      color: #4a372d;
    }
    button {
      cursor: pointer;
      background: linear-gradient(180deg, #fff7ee 0%, #f2e2cd 100%);
    }
    button:hover {
      background: linear-gradient(180deg, #fff0de 0%, #e9d3be 100%);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.94);
    }
    th, td {
      border: 1px solid #d4bba7;
      padding: 10px;
      text-align: left;
    }
    th {
      background: #f3e3d6;
    }
    tr:nth-child(even) td {
      background: rgba(245, 236, 225, 0.9);
    }
    hr {
      border: none;
      border-top: 1px solid #e6d2c0;
      margin: 24px 0;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #3f2e24;
      color: white;
      padding: 10px 14px;
      display: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Panel Admin - Cafetín</h1>
  <h2>Cargar Producto</h2>
  <div><label>Nombre: <input type="text" id="inNombre"></label></div>
  <div><label>Categoría:
    <select id="inCategoria">
      <option value="pasteles">Pasteles</option>
      <option value="bebidas">Bebidas</option>
      <option value="snacks">Snacks</option>
      <option value="comidas">Comidas</option>
    </select>
  </label></div>
  <div><label>Precio: <input type="number" id="inPrecio" step="0.01"></label></div>
  <div><button id="btnCargar">Cargar</button> <button id="btnLimpiar">Limpiar</button></div>
  <div id="listaProductos"><p>Aún no hay productos.</p></div>
  <hr>
  <h2>Pedidos</h2>
  <table><thead><tr><th>ID</th><th>Cliente</th><th>Pago</th><th>Productos</th><th>Total</th><th>Fecha de Pago</th><th>Acciones</th></tr></thead><tbody id="tbodyPedidos"></tbody></table>
</div>
<div id="toast" class="toast"></div>
<script type="module">
  import Cl_mCafetin from "./dist/models/Cl_mCafetin.js";
  import Cl_vAdmin from "./dist/views/Cl_vAdmin.js";
  import Cl_cAdmin from "./dist/controllers/Cl_cAdmin.js";
  const modelo = new Cl_mCafetin();
  const vista = new Cl_vAdmin();
  new Cl_cAdmin({ modelo, vista });
</script>
</body>
</html>
