<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafetín Listo - Inicio</title>
    <style>
      /* 1. IMPORTACIÓN DE FUENTES */
      @font-face {
        font-family: "MinecraftLogo";
        src: url("Minecrafter.Alt.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: "Minecraftia";
        src: url("Minecraftia-Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      /* Reset de estilos básicos */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        /* Imagen de fondo a pantalla completa con capa oscura */
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
          url("Resource/fondo-principal.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        width: 100vw;

        /* Centrado absoluto */
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      /* Contenedor principal ampliado para permitir el logo gigante */
      .menu-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        width: 100%;
        max-width: 1700px;
        padding: 20px;
      }

      /* 2. LOGO PNG AL DOBLE DE TAMAÑO */
      .titulo-container img {
        width: 100%;
        max-width: 1600px; /* <--- EL DOBLE DE GRANDE */
        height: auto;
        display: block;
        margin: 0 auto;
      }

      /* 3. BOTONES EN PARALELO MÁS ANCHOS */
      .botones-lista {
        list-style: none;
        width: 100%;
        max-width: 820px; /* Mas espacio para que "Administrador" no quede apretado */
        display: flex;
        flex-direction: row;
        gap: 20px;
      }

      .botones-lista li {
        flex: 1;
        display: flex;
      }

      /* ESTILO BASE DE LOS BOTONES */
      .btn-minecraft {
        width: 100%;
        display: flex;
        align-items: center;
        background-color: #7d6954;
        border: 3px solid #a2907a;
        color: #ffffff;
        text-decoration: none;
        font-family: "Minecraftia", sans-serif;
        padding: 12px 16px;
        text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.85);
        transition:
          background-color 0.1s,
          border-color 0.1s;
        box-shadow: 0px 5px 0px #4d3f32;
      }

      .btn-minecraft:hover {
        background-color: #8c7760;
        border-color: #b8a58f;
      }

      .btn-minecraft:active {
        transform: translateY(3px);
        box-shadow: 0px 2px 0px #4d3f32;
      }

      /* 4. ICONOS Y SEPARACIÓN CON EL TEXTO */
      .btn-icono {
        width: 44px;
        height: 44px;
        object-fit: contain;
        image-rendering: pixelated;
        flex-shrink: 0;
        margin-right: 12px; /* <--- SEPARACIÓN DEL ICONO HACIA LA DERECHA */
      }

      /* 5. TEXTO CENTRADO Y NORMALIADO */
      .btn-texto {
        flex-grow: 1;
        text-align: center;
        font-size: 15px;
        line-height: 1.2;
        margin-right: 56px; /* Compensación exacta (44px del icono + 12px del margen) */
      }
      @media (max-width: 768px) {
        .menu-container {
          gap: 20px;
        }

        /* Cambiar botones a vertical */
        .botones-lista {
          flex-direction: column;
          max-width: 400px;
          gap: 15px;
        }

        .btn-minecraft {
          padding: 10px 12px;
        }

        .btn-icono {
          width: 36px;
          height: 36px;
          margin-right: 8px;
        }

        .btn-texto {
          font-size: 13px;
          margin-right: 44px; /* Ajuste proporcional para celulares */
        }
      }

      @media (max-width: 400px) {
        .btn-texto {
          font-size: 11px;
          margin-right: 0; /* Quitar compensación si la pantalla es muy estrecha */
        }
      }
    </style>
  </head>
  <body>
    <div class="menu-container">
      <!-- Sección del Logo en PNG -->
      <div class="titulo-container">
        <img
          src="Resource/BIENVENIDO-AL-CAFETIN-20-7-2026.png"
          alt="Bienvenido al Cafetín"
        />
      </div>

      <!-- Sección de Botones en Paralelo -->
      <ul class="botones-lista">
        <li>
          <a href="Admin.html" class="btn-minecraft">
            <img src="Resource/bloque1.gif" alt="Admin" class="btn-icono" />
            <span class="btn-texto">Panel de Administrador</span>
          </a>
        </li>
        <li>
          <a href="Cliente.html" class="btn-minecraft">
            <img src="Resource/manzana.webp" alt="Cliente" class="btn-icono" />
            <span class="btn-texto">Panel de Cliente</span>
          </a>
        </li>
      </ul>
    </div>
  </body>
</html>
